plugins {
    id "com.android.application"
}

android {
    namespace "com.vibecoding.monitor"
    compileSdk 33

    defaultConfig {
        applicationId "com.vibecoding.monitor"
        minSdk 23
        targetSdk 33
        versionCode 9
        versionName "1.8-beta"
        buildConfigField "String", "UPDATE_MANIFEST_URL", "\"https://raw.githubusercontent.com/zhouhaoran-TJU/VibeMonitor/main/dist/version.json\""
    }

    buildTypes {
        beta {
            initWith debug
            matchingFallbacks = ["debug"]
            applicationIdSuffix ".beta"
            versionNameSuffix ""
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation "androidx.core:core:1.10.1"
}
